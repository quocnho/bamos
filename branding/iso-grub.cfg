# BamOS GRUB Menu Configuration
# Used for ISO/USB live boot media
# Inspired by RakuOS and Bazzite branding

set default=0
set timeout=10
set timeout_style=menu

# Load BamOS branding
if [ -f ${prefix}/bamos/theme.txt ]; then
    source ${prefix}/bamos/theme.txt
fi

# Set the default graphical mode
set gfxmode=auto
set gfxpayload=keep
insmod all_video
insmod gfxterm
terminal_output gfxterm

# Vietnamese locale support
insmod gettext

menuentry "Khởi động BamOS (Live)" --class bamos --class gnulinux --class os {
    linux /images/pxeboot/vmlinuz root=live:CDLABEL=BamOS rd.live.image rd.live.overlay.persistent=LABEL=BamOS quiet rhgb loglevel=3
    initrd /images/pxeboot/initrd.img
}

menuentry "BamOS Live (Basic Video)" --class bamos --class gnulinux {
    linux /images/pxeboot/vmlinuz root=live:CDLABEL=BamOS rd.live.image nomodeset quiet rhgb
    initrd /images/pxeboot/initrd.img
}

menuentry "Kiểm tra và khởi động BamOS" --class bamos --class gnulinux {
    linux /images/pxeboot/vmlinuz root=live:CDLABEL=BamOS rd.live.image rd.live.check quiet rhgb
    initrd /images/pxeboot/initrd.img
}

menuentry "Cài đặt BamOS vào ổ cứng" --class bamos --class install {
    linux /images/pxeboot/vmlinuz root=live:CDLABEL=BamOS rd.live.image inst.stage2=hd:LABEL=BamOS quiet rhgb
    initrd /images/pxeboot/initrd.img
}

submenu "Tùy chọn nâng cao (Advanced)" {
    menuentry "Chạy kiểm tra bộ nhớ (Memtest86+)" --class memtest {
        linux /images/memtest86+/memtest
    }

    menuentry "Khởi động từ ổ cứng" --class hdd {
        set root=(hd0)
        chainloader +1
    }
}
