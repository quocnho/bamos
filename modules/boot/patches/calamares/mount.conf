---
extraMounts:
- device: "proc"
  fs: "proc"
  mountPoint: "/proc"
- device: "sys"
  fs: "sysfs"
  mountPoint: "/sys"
- device: "/dev"
  mountPoint: "/dev"
  options:
  - bind
- device: "tmpfs"
  fs: "tmpfs"
  mountPoint: "/run"
- device: "/run/udev"
  mountPoint: "/run/udev"
  options:
  - bind
- device: "efivarfs"
  fs: "efivarfs"
  mountPoint: "/sys/firmware/efi/efivars"
  efi: true
btrfsSubvolumes:
- mountPoint: "/"
  subvolume: ""
- mountPoint: "/home"
  subvolume: "/home"
- mountPoint: "/nix"
  subvolume: "/nix"
- mountPoint: "/data"
  subvolume: "/data"
mountOptions:
- filesystem: "efi"
  options:
  - "fmask=0077"
  - "dmask=0077"
- filesystem: "btrfs"
  options:
  - "compress=zstd"
  - "noatime"
