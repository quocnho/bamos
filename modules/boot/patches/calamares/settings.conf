---
instances:
- config: packagechooser-edition.conf
  id: edition
  module: packagechooser
- config: packagechooser-machine.conf
  id: machine
  module: packagechooser
- config: unfree.conf
  id: unfree
  module: notesqml
- module: nixos
  weight: 48
- module: bamos-config
  weight: 1
modules-search:
- local
sequence:
- show:
  - welcome
  - locale
  - keyboard
  - users
  - packagechooser@edition
  - packagechooser@machine
  - notesqml@unfree
  - partition
  - summary
- exec:
  - partition
  - mount
  - bamos-config
  - nixos
  - users
  - umount
- show:
  - finished
branding: bamos
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
