# ═══════════════════════════════════════════════════════
# Release Pipeline — BamOS (NixOS Distribution)
#   Trigger: Push to main
#   Purpose: Build ALL ISOs, push to Cachix,
#            auto-generate version tag, create GitHub Release,
#            dispatch CD workflow to deploy to Cloudflare R2
# ═══════════════════════════════════════════════════════

name: 🚀 Release — BamOS

on:
  push:
    branches: [main]
    paths:
      [
        "**.nix",
        "flake.lock",
        "flake.nix",
        "VERSION",
        ".github/workflows/release*.yml",
      ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NIX_CONFIG: "accept-flake-config = true"

jobs:
  # ══════════════════════════════════════════════
  # Phase 1: Version Detection
  #   Strategy: VERSION.YYYYMMDD.BUILD
  #   Example:  v4.0.0.20260710.1
  # ══════════════════════════════════════════════
  version:
    name: 🏷️ Determine Version
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.get-version.outputs.version_tag }}
      version_base: ${{ steps.get-version.outputs.version_base }}
      last_tag: ${{ steps.get-version.outputs.last_tag }}
      is_prerelease: ${{ steps.get-version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: get-version
        run: |
          # Read base version from VERSION file
          VERSION_BASE=$(cat VERSION | tr -d ' \t\n')
          echo "📄 Base version: $VERSION_BASE"

          DATE_SUFFIX=$(date -u +%Y%m%d)
          echo "📅 Date: $DATE_SUFFIX"

          # Find last tag for changelog
          LAST_TAG=$(git tag --sort=-creatordate | head -1)
          echo "🏷️  Last tag: ${LAST_TAG:-none}"

          # Find latest tag matching today's build
          LATEST_TAG=$(git tag -l "v${VERSION_BASE}.${DATE_SUFFIX}.*" | sort -V | tail -1)

          if [ -n "$LATEST_TAG" ]; then
            BUILD_NUM=$(echo "$LATEST_TAG" | rev | cut -d'.' -f1 | rev)
            BUILD_NUM=$((BUILD_NUM + 1))
            echo "🔄 Previous build today: $LATEST_TAG → build #$BUILD_NUM"
          else
            BUILD_NUM=1
            echo "🎯 First build today → build #1"
          fi

          VERSION_TAG="v${VERSION_BASE}.${DATE_SUFFIX}.${BUILD_NUM}"
          echo "🏷️  Version tag: $VERSION_TAG"

          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "version_base=$VERSION_BASE" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG:-none}" >> "$GITHUB_OUTPUT"

          # Detect pre-release status (major version < 1.0.0)
          MAJOR=$(echo "$VERSION_BASE" | cut -d. -f1)
          if [ "$MAJOR" -lt 1 ] 2>/dev/null; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show version info
        run: |
          echo "## 🏷️ Version Info" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Base | ${{ steps.get-version.outputs.version_base }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ steps.get-version.outputs.version_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Last | ${{ steps.get-version.outputs.last_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prerelease | ${{ steps.get-version.outputs.is_prerelease }} |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════
  # Phase 2: Build Matrix + Quick Check
  # ══════════════════════════════════════════════

  prepare-matrix:
    name: 🎯 Build Matrix
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.matrix.outputs.variants }}
    steps:
      - id: matrix
        run: |
          echo 'variants={"variant":["gnome","kde","cosmic"]}' >> "$GITHUB_OUTPUT"
          echo "🧩 Build matrix: 3 unified ISOs (GNOME, KDE, COSMIC)"

  check:
    name: 🔍 Flake Check
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: ${{ env.NIX_CONFIG }}

      - name: Enable Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: bamos
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Flake check
        run: nix flake check --all-systems

      - name: Format check
        run: nix fmt -- --check . 2>/dev/null || nix-shell -p nixpkgs-fmt --run 'nixpkgs-fmt --check .'

  # ══════════════════════════════════════════════
  # Phase 3: Build ALL ISOs in Parallel
  #   - Build ISO with nix
  #   - Push to Cachix
  #   - Rename ISO with version tag
  #   - Generate SHA256 checksum
  #   - Upload as artifact
  # ══════════════════════════════════════════════
  build-iso:
    name: 📀 Build ${{ matrix.variant }}
    needs: [version, check, prepare-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: ${{ env.NIX_CONFIG }}

      - name: Enable Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: bamos
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ISO
        id: build
        run: |
          VARIANT="${{ matrix.variant }}"
          VERSION_TAG="${{ needs.version.outputs.version_tag }}"
          echo "🔨 Building iso-${VARIANT} for ${VERSION_TAG}..."
          START_TIME=$(date +%s)

          nix build ".#iso-${VARIANT}" --print-out-paths 2>&1

          DURATION=$(( $(date +%s) - START_TIME ))
          echo "⏱️  Build took $(( DURATION / 60 ))m $(( DURATION % 60 ))s"

          # Store paths
          ISO_STORE=$(readlink -f result)
          echo "ISO_STORE_PATH=$ISO_STORE" >> "$GITHUB_ENV"

          # Find and rename ISO
          ISO_FILE=$(find "$ISO_STORE" -name "*.iso" -type f | head -1)
          if [ -n "$ISO_FILE" ]; then
            ISO_DIR=$(dirname "$ISO_FILE")
            ISO_EXT="${ISO_FILE##*.}"
            RENAMED_ISO="${ISO_DIR}/bamos-${VARIANT}-${VERSION_TAG}.${ISO_EXT}"
            cp "$ISO_FILE" "$RENAMED_ISO"

            echo "ISO_FILE=$RENAMED_ISO" >> "$GITHUB_ENV"
            ISO_SIZE=$(du -h "$RENAMED_ISO" | cut -f1)
            ISO_CHECKSUM=$(sha256sum "$RENAMED_ISO" | cut -d' ' -f1)
            echo "📀 ISO: bamos-${VARIANT}-${VERSION_TAG}.${ISO_EXT} (${ISO_SIZE})"
            echo "🔐 SHA256: ${ISO_CHECKSUM}"

            # Save checksum
            echo "${ISO_CHECKSUM}  bamos-${VARIANT}-${VERSION_TAG}.${ISO_EXT}" > "${RENAMED_ISO}.sha256"

            # Save to job summary
            echo "### 📀 $VARIANT" >> $GITHUB_STEP_SUMMARY
            echo "- File: \`bamos-${VARIANT}-${VERSION_TAG}.${ISO_EXT}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Size: ${ISO_SIZE}" >> $GITHUB_STEP_SUMMARY
            echo "- SHA256: \`${ISO_CHECKSUM}\`" >> $GITHUB_STEP_SUMMARY
            echo "- ⏱️  Build time: $(( DURATION / 60 ))m $(( DURATION % 60 ))s" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  No ISO file found in build output!"
            echo "ISO_FILE=" >> "$GITHUB_ENV"
          fi

      - name: Push to Cachix
        run: |
          echo "📤 Pushing to Cachix..."
          cachix push bamos "${{ env.ISO_STORE_PATH }}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: bamos-iso-${{ matrix.variant }}-${{ needs.version.outputs.version_tag }}
          path: |
            ${{ env.ISO_FILE }}
            ${{ env.ISO_FILE }}.sha256
          retention-days: 90
          if-no-files-found: error

  # ══════════════════════════════════════════════
  # Phase 4: Generate Changelog
  # ══════════════════════════════════════════════
  generate-changelog:
    name: 📝 Generate Changelog
    needs: version
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG="${{ needs.version.outputs.last_tag }}"
          CURRENT_TAG="${{ needs.version.outputs.version_tag }}"
          REPO="${{ github.repository }}"

          python3 .github/scripts/generate-changelog.py \
            "${LAST_TAG}" "${CURRENT_TAG}" "${REPO}" > changelog.md

          echo "📝 Changelog generated ($(wc -l < changelog.md) lines)"

          # Show preview
          echo "### 📝 Changelog Preview" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 changelog.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Read as single line for output
          CHANGELOG=$(cat changelog.md)
          echo "changelog<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.version_tag }}
          path: changelog.md
          retention-days: 90

  # ══════════════════════════════════════════════
  # Phase 5: Create GitHub Release
  #   - Automatically creates git tag
  #   - Attaches all ISO artifacts
  #   - Includes changelog as release body
  # ══════════════════════════════════════════════
  release:
    name: 🚀 Create GitHub Release
    needs: [version, build-iso, generate-changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      release_url: ${{ steps.create-release.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all ISO artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bamos-iso-*
          path: ./release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "📦 Release artifacts for ${{ needs.version.outputs.version_tag }}:"
          ls -lh ./release-artifacts/
          echo ""
          echo "### 📦 Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh ./release-artifacts/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.version_tag }}
          path: ./changelog

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version_tag }}
          name: "BamOS ${{ needs.version.outputs.version_tag }}"
          body_path: ./changelog/changelog.md
          files: |
            ./release-artifacts/*.iso
            ./release-artifacts/*.sha256
          generate_release_notes: false
          fail_on_unmatched_files: false
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          make_latest: true

      - name: Save release info
        run: |
          echo "✅ GitHub Release created!"
          echo "🌐 URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.version_tag }}"
          echo "### 🚀 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ needs.version.outputs.version_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.version_tag }})" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════
  # Phase 6: Dispatch CD — Deploy to Cloudflare R2
  #   Triggers release-cd.yml via workflow_dispatch
  # ══════════════════════════════════════════════
  dispatch-cd:
    name: 📤 Dispatch CD to Cloudflare R2
    needs: [version, release]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch CD workflow
        run: |
          TAG="${{ needs.version.outputs.version_tag }}"
          echo "📤 Dispatching CD workflow for tag: $TAG"

          # Wait for GitHub to fully register the release/tag
          sleep 5

          gh workflow run release-cd.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field tag="$TAG"

          echo "✅ CD workflow dispatched!"
          echo ""
          echo "### 📤 CD Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: \`release-cd.yml\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Check [Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
