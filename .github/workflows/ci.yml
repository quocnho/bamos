# CI/CD Pipeline — BamOS (NixOS Distribution)
# Validates, builds, and distributes ISO images
# Binary cache: Cachix | ISO distribution: GitHub Releases

name: CI/CD — BamOS

on:
  push:
    branches: [master, develop]
    tags: ["v*"]
    paths: ["**.nix", "flake.lock", "flake.nix", ".github/workflows/**"]
  pull_request:
    branches: [master]

jobs:
  # ═══════════════════════════════════════════════════════
  # Check: validate flake, format, lint
  # ═══════════════════════════════════════════════════════
  check:
    name: Check Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Flake check
        run: nix flake check --all-systems
      - name: Format check (nixpkgs-fmt)
        run: |
          nix fmt -- --check . 2>/dev/null || \
          nix-shell -p nixpkgs-fmt --run 'nixpkgs-fmt --check .'
      - name: Dead code check (deadnix)
        run: nix-shell -p deadnix --run 'deadnix --fail .'
      - name: Static analysis (statix)
        run: nix-shell -p statix --run 'statix check .'

  # ═══════════════════════════════════════════════════════
  # Build ISO + Push cache to Cachix
  # ═══════════════════════════════════════════════════════
  build-iso:
    name: Build ISO — GNOME Standard
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v15
        with:
          name: bamos
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build GNOME Standard ISO
        run: |
          nix build .#iso-gnome-standard --print-out-paths
          echo "ISO_PATH=$(readlink -f result)" >> $GITHUB_ENV
      - name: Push to Cachix
        run: cachix push bamos ${{ env.ISO_PATH }}
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: bamos-gnome-standard-iso
          path: ${{ env.ISO_PATH }}
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  # Release: upload ISO lên GitHub Releases (chỉ khi push tag)
  # ═══════════════════════════════════════════════════════
  release:
    name: GitHub Release
    needs: build-iso
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bamos-gnome-standard-iso
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BamOS ${{ github.ref_name }}"
          body: "BamOS GNOME Standard — ${{ github.ref_name }}\n\nSee [CHANGELOG](../../plan/07-increment/release-notes.md) for details."
          files: "*.iso"
          generate_release_notes: true
