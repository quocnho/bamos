name: Validate Build

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Containerfile syntax
        run: |
          echo "Validating Containerfile syntax..."
          docker build --check . -f Containerfile

      - name: Validate recipe configuration
        run: |
          echo "Validating recipe YAML..."
          python3 -c "import yaml; yaml.safe_load(open('config/recipe.yml'))" || \
          ruby -ryaml -e "YAML.load_file('config/recipe.yml')"

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -exec python3 -m json.tool {} \; > /dev/null

      - name: Check shell scripts syntax
        run: |
          echo "Checking shell script syntax..."
          find build_files/ -name "*.sh" -exec bash -n {} \;

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          format: auto
          config_file: .yamllint.yml
