name: bamos-gnome-nvidia
description: BamOS GNOME Edition with NVIDIA GPU support

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: gnome-system
        destination: /

  - type: script
    scripts:
      - 00-build-setup.sh

  - type: script
    scripts:
      - 01-install-packages.sh

  - type: dnf
    remove:
      packages:
        - firefox
        - firefox-langpacks
    install:
      packages:
        - nautilus-gsconnect
        - gnome-tweaks

  - type: dnf
    install:
      packages:
        - akmod-nvidia
        - xorg-x11-drv-nvidia-cuda
        - nvidia-vaapi-driver
        - nvidia-persistenced

  - type: script
    scripts:
      - 03-nvidia-setup.sh

  - type: script
    scripts:
      - 02-post-build.sh

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe
          - org.gnome.Calculator
          - org.gnome.baobab
          - org.gnome.Characters
          - org.gnome.clocks

  - type: signing
