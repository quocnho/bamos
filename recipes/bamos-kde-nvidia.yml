name: bamos-kde-nvidia
description: BamOS KDE Plasma Edition with NVIDIA GPU support

base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: kde-system
        destination: /

  - type: script
    scripts:
      - 00-build-setup.sh

  - type: dnf
    remove:
      packages:
        - plasma-discover
        - plasma-discover-offline-updates
        - plasma-discover-packagekit
        - plasma-welcome
        - plasma-welcome-fedora

  - type: script
    scripts:
      - 01-install-packages.sh

  - type: script
    scripts:
      - 03-nvidia-setup.sh

  - type: script
    scripts:
      - 02-post-build.sh

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - org.kde.kcalc
          - org.kde.okular
      - scope: user

  - type: signing
