name: bamos-gnome
description: BamOS GNOME Edition — Clean, modern, productivity-focused

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: files
    files:
      - source: gnome-system
        destination: /

  - type: script
    scripts:
      - 00-build-setup.sh

  - type: dnf
    remove:
      packages:
        - gnome-software-rpm-ostree
        - gnome-tour

  - type: script
    scripts:
      - 01-install-packages.sh

  - type: script
    scripts:
      - 02-post-build.sh

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.Loupe
          - org.gnome.TextEditor
          - org.gnome.clocks
          - runtime/org.gtk.Gtk3theme.adw-gtk3
          - runtime/org.gtk.Gtk3theme.adw-gtk3-dark
      - scope: user

  - type: signing
