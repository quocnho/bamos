<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bamboo-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#235e3a"/>
      <stop offset="100%" style="stop-color:#2d8a4e"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Ambient light orbs -->
  <circle cx="300" cy="300" r="250" fill="url(#bamboo-green)" opacity="0.08"/>
  <circle cx="1600" cy="800" r="350" fill="#7eb4f8" opacity="0.06"/>
  <circle cx="900" cy="650" r="180" fill="#4bac00" opacity="0.05"/>
  <!-- Watermark -->
  <text x="960" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="130" font-weight="800" fill="#2d8a4e" opacity="0.12">BamOS</text>
</svg>
