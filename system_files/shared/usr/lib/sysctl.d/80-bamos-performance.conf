# BamOS Sysctl Performance Tuning (CachyOS-inspired)
# Applied at boot via systemd-sysctl

# =============================================================================
# Virtual Memory
# =============================================================================
# Reduce swappiness — prefer RAM over swap for desktop use
vm.swappiness=30

# Enable Multi-Gen LRU for better page reclaim on modern kernels
vm.lru_gen.enabled=1

# =============================================================================
# Network Performance (BBR TCP)
# =============================================================================
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# Increase network buffer sizes for better throughput
net.core.rmem_max=16777216
net.core.wmem_max=16777216

# Enable TCP Fast Open
net.ipv4.tcp_fastopen=3

# =============================================================================
# File System
# =============================================================================
# Increase max file handles (for development/browsing workloads)
fs.file-max=2097152
fs.nr_open=2097152

# Increase inotify watchers (for IDEs, file watchers)
fs.inotify.max_user_watches=524288

# =============================================================================
# I/O
# =============================================================================
# Allow more in-flight I/O requests
fs.aio-max-nr=1048576
