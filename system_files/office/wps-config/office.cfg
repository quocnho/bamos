# WPS Office Configuration for Vietnamese users

[General]
# Language settings
Lang=vi_VN
UILang=vi_VN

[Fonts]
# Vietnamese font substitutions for document compatibility
# Map common Vietnamese fonts to available fonts
FontSubstitutes=VNI-Times=Noto Serif
FontSubstitutes=.VnTime=Noto Serif
FontSubstitutes=VNI-Helve=Noto Sans
FontSubstitutes=.VnArial=Noto Sans
FontSubstitutes=Times New Roman=Noto Serif
FontSubstitutes=Arial=Noto Sans

[Display]
# UI appearance
Theme=Office2016
Skin=White

[SpellCheck]
# Enable Vietnamese spell checking
Language=vi_VN
Enabled=true

[File]
# Default save format
DefaultFormat=docx
# Auto-save
AutoSave=true
AutoSaveInterval=5

[Cloud]
# Disable cloud sync by default (privacy)
CloudSync=false
