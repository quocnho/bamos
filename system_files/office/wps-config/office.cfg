# WPS Office Configuration for Vietnamese users

[General]
# Language settings
Lang=vi_VN
UILang=vi_VN

[Fonts]
# Vietnamese font substitutions for document compatibility
# WPS format: FamilyName=SubstitutionFont
FontSubstitutes=VNI-Times=Noto Serif
FontSubstitutes=.VnTime=Noto Serif
FontSubstitutes=VNI-Helve=Noto Sans
FontSubstitutes=.VnArial=Noto Sans
FontSubstitutes=VNI-Aptima=Inter
FontSubstitutes=.VnTimeH=Noto Serif
FontSubstitutes=Times New Roman=Liberation Serif
FontSubstitutes=Arial=Liberation Sans
FontSubstitutes=Courier New=Liberation Mono
FontSubstitutes=Calibri=Carlito
FontSubstitutes=Cambria=Caladea
FontSubstitutes=Tahoma=Liberation Sans
FontSubstitutes=Symbol=OpenSymbol
FontSubstitutes=Wingdings=DejaVu Sans
FontSubstitutes=Wingdings 2=DejaVu Sans
FontSubstitutes=Wingdings 3=DejaVu Sans
FontSubstitutes=Webdings=DejaVu Sans
FontSubstitutes=MT Extra=DejaVu Sans

[Display]
# UI appearance
Theme=Office2016
Skin=White

# DPI rendering for XWayland (prevents blurry fonts)
# 96 DPI = 100% scaling, 144 DPI = 150% scaling
DPIScale=1.0
FontRender=0

[SpellCheck]
# Enable Vietnamese spell checking
Language=vi_VN
Enabled=true

[File]
# Default save format
DefaultFormat=docx
# Auto-save
AutoSave=true
AutoSaveInterval=5

[Cloud]
# Disable cloud sync by default (privacy)
CloudSync=false
