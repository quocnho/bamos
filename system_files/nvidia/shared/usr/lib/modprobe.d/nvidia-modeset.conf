# NVIDIA modesetting - force modeset for Wayland support
# This is required for proper Wayland/non-X11 operation
options nvidia-drm modeset=1
options nvidia-drm fbdev=1

# Enable NVIDIA power management
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp

# Enable GSP firmware for Turing+ GPUs (RTX 20+)
# Automatically detected and enabled by driver for supported GPUs
# For legacy GPUs (Kepler/Maxwell/Pascal), GSP is automatically disabled
