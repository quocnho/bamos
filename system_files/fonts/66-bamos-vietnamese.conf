<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  BamOS Vietnamese Font Configuration
  Priority order for font fallback chains
-->
<fontconfig>

  <!-- ================================================================ -->
  <!-- Default Font Families for Vietnamese                             -->
  <!-- ================================================================ -->

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Liberation Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Inter</family>
      <family>Liberation Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>Noto Sans Mono</family>
      <family>Liberation Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <!-- ================================================================ -->
  <!-- Microsoft Font Replacements — compatible metrics                 -->
  <!-- ================================================================ -->

  <alias binding="same">
    <family>Times New Roman</family>
    <accept><family>Liberation Serif</family></accept>
  </alias>

  <alias binding="same">
    <family>Arial</family>
    <accept><family>Liberation Sans</family></accept>
  </alias>

  <alias binding="same">
    <family>Courier New</family>
    <accept><family>Liberation Mono</family></accept>
  </alias>

  <alias binding="same">
    <family>Tahoma</family>
    <accept><family>Liberation Sans</family></accept>
  </alias>

  <alias binding="same">
    <family>Calibri</family>
    <accept><family>Carlito</family></accept>
  </alias>

  <alias binding="same">
    <family>Cambria</family>
    <accept><family>Caladea</family></accept>
  </alias>

  <!-- ================================================================ -->
  <!-- Vietnamese Proprietary Font Aliases (when installed by user)     -->
  <!-- These do nothing unless the actual font files exist              -->
  <!-- ================================================================ -->

  <alias>
    <family>VNI-Times</family>
    <accept><family>Noto Serif</family></accept>
  </alias>

  <alias>
    <family>VNI-Helve</family>
    <accept><family>Noto Sans</family></accept>
  </alias>

  <alias>
    <family>VNI-Aptima</family>
    <accept><family>Inter</family></accept>
  </alias>

  <alias>
    <family>.VnTime</family>
    <accept><family>Noto Serif</family></accept>
  </alias>

  <alias>
    <family>.VnArial</family>
    <accept><family>Noto Sans</family></accept>
  </alias>

  <alias>
    <family>.VnTimeH</family>
    <accept><family>Noto Serif</family></accept>
  </alias>

  <!-- ================================================================ -->
  <!-- Rendering Settings for Vietnamese                                -->
  <!-- ================================================================ -->

  <!-- Sub-pixel rendering for LCD screens -->
  <match target="font">
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
  </match>

  <!-- Slight hinting — best balance for Latin + Vietnamese diacritics -->
  <match target="font">
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
  </match>

  <!-- Anti-aliasing -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
  </match>

  <!-- Exclude CJK fonts from Noto Sans fallback (use dedicated CJK family) -->
  <match target="scan">
    <test name="family" compare="eq">
      <string>Noto Sans CJK KR</string>
    </test>
    <edit name="lang" mode="assign">
      <minus><name>lang</name><langset><string>vi</string></langset></minus>
    </edit>
  </match>

</fontconfig>
