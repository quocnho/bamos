# KDE Plasma Configuration for BamOS (Windows 11-like experience)

# =============================================================================
# Main Panel Configuration
# Windows 11 style: centered icons, transparent, modern look
# =============================================================================
[plasma-org.kde.plasma.desktop-appletsrc]
[Containments][1][applets][2][configuration]
# Task Manager (icon-only, centered)
[Containments][1][applets][2][configuration][General]
forceStripes=true
groupingStrategy=0
groupPopups=true
iconSpacing=2
launchers=preferred://browser,preferred://filemanager,applications:org.kde.konsole.desktop,applications:org.kde.discover.desktop,applications:com.wps.Office.desktop

# Panel Configuration
[Containments][1]
formfactor=2
location=4
plugin=org.kde.plasma.panel
wallpaperplugin=org.kde.image

# =============================================================================
# Desktop Theme (Windows 11-inspired)
# =============================================================================
[org.kde.desktop]
ColorScheme=BreezeDark
widgetStyle=Breeze

[org.kde.plasma.desktop]
# Wallpaper
[org.kde.plasma.desktop][Wallpaper][org.kde.image][General]
Image=file:///usr/share/backgrounds/bamos/default.png

# =============================================================================
# KWin Window Management
# =============================================================================
[org.kde.kwin]
[org.kde.kwin][Effect-kwin4_effect_translucency]
[org.kde.kwin][Windows]
BorderSize=Normal
TitlebarButtons=MBAC
Placement=Centered

# Windows-like keyboard shortcuts
[org.kde.kglobalshortcuts]
[org.kde.kglobalaccel]
[org.kde.kglobalaccel][Component=kwin]
_kwin_ShowDesktop=Meta+D
Window Close=Alt+F4
Window Maximize=Meta+Up
Window Minimize=Meta+Down
Window Quick Tile Left=Meta+Left
Window Quick Tile Right=Meta+Right
Window Snapping=Meta+Z
Switch to Next Desktop=Meta+Tab

# Task Switcher (Alt+Tab with thumbnails)
[org.kde.kwin][TabBox]
LayoutName=org.kde.breeze.desktop
ShowTabBox=true

# =============================================================================
# Font Configuration
# =============================================================================
[org.kde.fonts]
[org.kde.fonts][General]
font=Noto Sans,10,-1,5,50,0,0,0,0,0
menuFont=Noto Sans,10,-1,5,50,0,0,0,0,0
smallestReadableFont=Noto Sans,8,-1,5,50,0,0,0,0,0
toolBarFont=Noto Sans,9,-1,5,50,0,0,0,0,0
activeFont=Noto Sans,10,-1,5,50,0,0,0,0,0

[org.kde.fonts][General][fontAntialiasing]
Enabled=true
Configuration=rgba
Hinting=slight

# =============================================================================
# Icons and Cursors
# =============================================================================
[org.kde.plasma]
[org.kde.plasma][Theme]
name=bamos-plasma

[org.kde.icons]
Theme=breeze-dark

[org.kde.cursors]
Theme=Bibata_Modern_Classic

# =============================================================================
# Start Menu (Windows 11-style grid layout)
# =============================================================================
[org.kde.plasma.kickoff]
[org.kde.plasma.kickoff][General]
ShowAppsByName=true
icon=start-here-kde

# =============================================================================
# Input Method (ibus-bamboo)
# =============================================================================
[org.kde.im]
[org.kde.im][General]
InputMethod=ibus

# =============================================================================
# Application Launcher
# =============================================================================
[org.kde.plasma.kickoff]
[org.kde.plasma.kickoff][Favorites]
FavoriteURLs=preferred://browser,preferred://filemanager,systemsettings.desktop,org.kde.konsole.desktop,org.kde.discover.desktop,com.wps.Office.desktop,zalo.desktop

# =============================================================================
# System Tray
# =============================================================================
[org.kde.plasma.systemtray]
[org.kde.plasma.systemtray][General]
SystrayContainment=org.kde.plasma.systemtray
