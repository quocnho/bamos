# BamOS Fcitx5 Unikey Configuration
# Vietnamese input via Unikey engine

# Input mode: 0=Telex, 1=VNI, 2=VIQR, 3=Microsoft Telex
InputMethod=Telex

# Flash preview on input
FlashEnabled=true

# Composition tip: show pending characters
CompositionModeEnabled=true

# Word suggestion
SuggestionEnabled=true
